name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch SVGs from API
        run: |
          curl -f -s -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=Songpanon&show_icons=true&theme=radical"
          curl -f -s -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs?username=Songpanon&layout=compact&theme=radical"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add github-stats.svg top-langs.svg
          # จะ commit ก็ต่อเมื่อไฟล์รูปมีการเปลี่ยนแปลงเท่านั้น
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update github stats svgs" && git push)
